<div class="dp-header">
  <div>
    <div class="dp-id">Rendszer</div>
    <div class="dp-title">Beállítások</div>
  </div>
  <button class="icon-btn" onclick="closeDetail()" title="Bezárás">
    <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
  </button>
</div>

<div class="dp-body" style="padding: 22px;">

  <div class="settings-section">
    <div class="settings-section__title">Adatbázis</div>

    <div class="settings-row">
      <div class="settings-row__info">
        <div class="settings-row__label">Mentés letöltése</div>
        <div class="settings-row__sub">Teljes adatbázis exportálása Excel formátumban (.xlsx)</div>
      </div>
      <a href="/api/admin/backup" download class="topbar-primary" style="text-decoration:none;font-size:11px;padding:6px 14px">
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Backup letöltés
      </a>
    </div>
  </div>

  <div class="settings-section" style="margin-top:28px;">
    <div class="settings-section__title">Térképadatok</div>

    <div class="settings-row">
      <div class="settings-row__info">
        <div class="settings-row__label">Geocoding futtatása</div>
        <div class="settings-row__sub">Hiányzó koordináták pótlása a projektek helyszíneihez</div>
      </div>
      <button class="topbar-primary" style="font-size:11px;padding:6px 14px"
              hx-post="/api/admin/geocode" hx-swap="none"
              onclick="showToast('Geocoding elindítva…'); this.disabled=true">
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
        </svg>
        Geocoding indítása
      </button>
    </div>
  </div>

</div>

<style>
.settings-section__title {
  font-family: var(--mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--ink-3); margin-bottom: 14px;
}
.settings-row {
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  padding: 14px 0; border-bottom: 1px solid var(--rule);
}
.settings-row__label {
  font-size: 13.5px; font-weight: 600; color: var(--ink); margin-bottom: 3px;
}
.settings-row__sub {
  font-size: 12px; color: var(--ink-3); max-width: 300px;
}
</style>
